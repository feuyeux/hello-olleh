title: Hello Olleh
description: AI Coding CLI 源码分析工作区
url: "https://feuyeux.github.io/hello-olleh"
baseurl: "/hello-olleh"

permalink: pretty

# GitHub Pages configuration
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    default_lang: plaintext
  input: GFM

# Build settings
timezone: Asia/Shanghai

# Exclude upstream source directories from Jekyll processing
exclude:
  - claude-code
  - codex
  - gemini-cli
  - opencode
  - openclaw
  - prompts
  - scripts
  - hello-harness
  - vendor/bundle
  - node_modules
  - .git
  - .github
