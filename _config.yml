title: Hello Olleh
description: AI Coding CLI 源码分析工作区
url: "https://feuyeux.github.io"
baseurl: "/hello-olleh"

permalink: pretty

# Directory configuration
layouts_dir: pages/_layouts
includes_dir: pages/_includes
data_dir: pages/_data
sass_dir: pages/_sass

# GitHub Pages configuration
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Include files needed for GitHub Pages
include:
  - pages
  - Gemfile
  - CLAUDE.md
  - AGENTS.md
  - GEMINI.md

markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    default_lang: plaintext
  input: GFM

# Build settings
timezone: Asia/Shanghai
