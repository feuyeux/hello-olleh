name: Generate PDF Ebooks

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  generate-pdfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          cache-version: '1'
          working-directory: pages

      - name: Install Ruby gems
        run: cd pages && bundle install

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system dependencies for Puppeteer
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            fonts-noto-cjk \
            libgbm1 libxss1 libasound2t64 \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libpango-1.0-0 \
            libcairo2 libasound2t64 libatspi2.0-0

      - name: Install npm dependencies
        run: cd pages && npm install

      - name: Build Jekyll site
        run: cd pages && bundle exec jekyll build --trace
        env:
          JEKYLL_ENV: production

      - name: Check build output
        run: ls -la pages/_site/ && ls -la pages/_site/hello-claude-code/ 2>/dev/null | head -10

      - name: Generate PDF ebooks
        run: node pages/scripts/generate-pdfs.js

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-olleh-ebook
          path: pages/_site/hello-olleh-complete.pdf
          retention-days: 30
