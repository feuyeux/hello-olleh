<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% if site.url %}<link rel="canonical" href="{{ site.url }}{{ page.url }}">{% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ 'style.css' | relative_url }}">
  
  <!-- Mermaid.js for diagram rendering -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Initialize Mermaid with theme matching site
      mermaid.initialize({ 
        startOnLoad: false,
        theme: 'neutral',
        flowchart: { useMaxWidth: true, htmlLabels: true },
        sequence: { useMaxWidth: true },
        securityLevel: 'loose'
      });
      
      // Find all mermaid code blocks and render them
      document.querySelectorAll('pre code.language-mermaid').forEach((block) => {
        const pre = block.parentElement;
        const code = block.textContent;
        const id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
        
        // Create a container for the mermaid diagram
        const container = document.createElement('div');
        container.className = 'mermaid-container';
        container.id = id;
        
        // Process mermaid code - remove frontmatter config if present
        let mermaidCode = code.replace(/^---\n[\s\S]*?\n---\n/, '');
        container.textContent = mermaidCode.trim();
        
        pre.replaceWith(container);
      });
      
      // Render all mermaid diagrams
      mermaid.run({ querySelector: '.mermaid-container' });
    });
  </script>
</head>
<body class="site-shell {% if page.url == '/' %}is-home{% endif %} {% if page.layout %}layout-{{ page.layout }}{% endif %}">
  <nav class="site-nav">
    <div class="nav-topline">
      <div class="nav-topline-inner page-wrapper">
        <span>Source Intelligence Review</span>
        <span>AI Coding CLI Archives</span>
        <span>{{ "now" | date: "%Y" }} Edition</span>
      </div>
    </div>
    <div class="nav-inner page-wrapper">
      <a href="{{ '/' | relative_url }}" class="nav-brand">
        <span class="nav-brand-main">Hello Olleh</span>
        <span class="nav-brand-sub">Engineering Gazette</span>
      </a>
      <div class="nav-links">
        <a href="{{ 'hello-claude-code/' | relative_url }}">Claude Code</a>
        <a href="{{ 'hello-codex/' | relative_url }}">Codex</a>
        <a href="{{ 'hello-gemini-cli/' | relative_url }}">Gemini CLI</a>
        <a href="{{ 'hello-opencode/' | relative_url }}">OpenCode</a>
        <a href="{{ 'hello-harness/' | relative_url }}">Harness</a>
      </div>
    </div>
  </nav>

  <main class="site-main">
    {{ content }}
  </main>
</body>
</html>
