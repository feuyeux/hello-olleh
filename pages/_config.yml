title: Hello Olleh
description: AI Coding CLI 源码分析工作区
url: "https://feuyeux.github.io/hello-olleh"
baseurl: "/hello-olleh"

# Build from repo root so hello-* directories are accessible
source: ..
layouts_dir: pages/_layouts

permalink: pretty

# GitHub Pages configuration
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    default_lang: plaintext
  input: GFM

# Build settings
timezone: Asia/Shanghai

# Exclude upstream source directories and non-doc files from Jekyll processing
exclude:
  - claude-code
  - codex
  - gemini-cli
  - opencode
  - claw-code
  - hello-olleh-memory
  - prompts
  - vendor
  - node_modules
  - .git
  - .github
  - .idea
  - .vscode
  - sync_repos.sh
  - AGENTS.md
  - GEMINI.md
  - CLAUDE.md
  - pages/Gemfile
  - pages/Gemfile.lock
  - pages/package.json
  - pages/package-lock.json
  - pages/scripts
